name: Desplegar Torneo JC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v3

      - name: 2. Configurar la llave SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'just-a-placeholder'
      
      - name: 3. Añadir el servidor a la lista de confianza
        run: ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: 4. Copiar archivos al servidor
        run: |
          ssh ${{ secrets.USERNAME }}@${{ secrets.HOST }} "mkdir -p /var/www/torneosjc/html"
          rsync -avz --delete . ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/torneosjc/html/